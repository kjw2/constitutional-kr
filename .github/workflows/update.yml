name: Constitutional Decisions Update

on:
  schedule:
    - cron: '30 11 * * *' # 20:30 KST (UTC+9)
  workflow_dispatch:
    inputs:
      days:
        description: 'Lookback days'
        required: false
        default: '14'
      limit:
        description: 'Optional smoke-test limit'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: constitutional-update
  cancel-in-progress: false

env:
  WORKSPACE_ROOT: ${{ github.workspace }}
  CONSTITUTIONAL_KR_REPO: ${{ github.workspace }}/constitutional-kr
  PIPELINE_REPO: ${{ github.workspace }}/legalize-pipeline
  LEGALIZE_CACHE_DIR: ${{ github.workspace }}/.cache
  LAW_API_BASE: https://www.law.go.kr/DRF

jobs:
  update:
    # GitHub-hosted runners cannot reliably reach law.go.kr, so run on the
    # dedicated Windows self-hosted runner with verified outbound API access.
    runs-on: [self-hosted, Windows, X64, constitutional]
    timeout-minutes: 120
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout data repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          path: constitutional-kr

      - name: Checkout pipeline
        uses: actions/checkout@v6
        with:
          repository: kjw2/legalize-pipeline
          ref: codex/constitutional-pipeline
          path: legalize-pipeline

      - name: Show Python version
        run: python --version

      - name: Install dependencies
        run: python -m pip install -r "$env:PIPELINE_REPO/requirements.txt"

      - name: Configure git
        working-directory: ${{ env.CONSTITUTIONAL_KR_REPO }}
        run: |
          git config user.name "legalize-kr-bot"
          git config user.email "bot@legalize.kr"

      - name: Check law.go.kr connectivity
        run: |
          curl.exe --connect-timeout 10 --max-time 20 --silent --show-error `
            "$env:LAW_API_BASE/lawSearch.do?target=detc&type=XML&display=1&page=1&OC=$env:LAW_OC" `
            | Out-Null
        env:
          LAW_OC: ${{ secrets.LAW_OC }}

      - name: Update decisions
        working-directory: ${{ env.PIPELINE_REPO }}
        env:
          LAW_OC: ${{ secrets.LAW_OC }}
          LIMIT: ${{ inputs.limit }}
        run: |
          if ($env:LIMIT) {
            python -m constitutional.fetch_cache --limit "$env:LIMIT"
            python -m constitutional.import_decisions --limit "$env:LIMIT" --output-dir "$env:CONSTITUTIONAL_KR_REPO" --git --skip-dedup
          } else {
            python -m constitutional.update `
              --days ${{ inputs.days || '14' }} `
              --output-dir "$env:CONSTITUTIONAL_KR_REPO" `
              --commit `
              --refresh-recent
          }

      - name: Validate
        working-directory: ${{ env.PIPELINE_REPO }}
        run: python -m constitutional.validate "$env:CONSTITUTIONAL_KR_REPO"

      - name: Push changes
        working-directory: ${{ env.CONSTITUTIONAL_KR_REPO }}
        run: |
          $changes = git log origin/main..HEAD --oneline
          if ($changes) {
            git push
          } else {
            "No new commits to push"
          }
